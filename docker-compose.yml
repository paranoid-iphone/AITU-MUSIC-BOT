services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: aitu_music
      POSTGRES_USER: aitu
      POSTGRES_PASSWORD: aitu
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U aitu -d aitu_music"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build: .
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    env_file: .env
    ports:
      - "8000:8000"
    volumes:
      - .:/app
    depends_on:
      db:
        condition: service_healthy

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  bot:
    build: .
    command: python -m app.bot.main
    env_file: .env
    volumes:
      - .:/app
    depends_on:
      - backend
      - redis

volumes:
  postgres_data:
